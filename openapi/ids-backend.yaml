    get:
      tags:
        - Reports
      summary: Download a curated report as CSV or JSON
      operationId: downloadCuratedReport
      parameters:
        - name: name
          in: path
          required: true
          description: Curated report key (e.g. top_source_ips)
          schema:
            type: string
        - $ref: '#/components/parameters/ReportFormat'
      responses:
        '200':
          description: Streamed report file (attachment)
          content:
            text/csv:
              schema:
                type: string
                format: binary
            application/json:
              schema:
                type: string
                format: binary
        '400':
          $ref: '#/components/responses/BadRequest'

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: >-
        Operator JWT obtained from `POST /api/auth/login`. Send as
        `Authorization: Bearer <token>`.
    apiKeyAuth:
      type: apiKey
      in: header
      name: X-API-Key
      description: >-
        Pre-shared edge-agent key. Accepted on the agent ingest endpoints in
        place of a bearer token. The ruleset GET also accepts it as an `apiKey`
        query parameter, since the agent's fetcher cannot set request headers.
    apiKeyQueryAuth:
      type: apiKey
      in: query
      name: apiKey
      description: >-
        Edge-agent key supplied as a query parameter. Used only by the ruleset
        GET, whose fetcher (`uclient-fetch`) cannot set request headers.

  parameters:
    DeviceIdPath:
      name: deviceId
      in: path
      required: true
      description: Device identifier
      schema:
        type: string
    AlertIdPath:
      name: alertId
      in: path
      required: true
      description: Alert identifier
      schema:
        type: string
    PageParam:
      name: page
      in: query
      required: false
      schema:
        type: integer
        format: int32
        default: 0
    SizeParam:
      name: size
      in: query
      required: false
      schema:
        type: integer
        format: int32
        default: 20
    DirectionParam:
      name: direction
      in: query
      required: false
      schema:
        type: string
        enum: [asc, desc]
        default: desc

    # ── Alert export filters (all optional; omitting one drops the predicate) ──
    FilterFrom:
      name: from
      in: query
      required: false
      description: Lower time bound (ISO-8601 date or instant, UTC).
      schema:
        type: string
        example: "2026-06-12"
    FilterTo:
      name: to
      in: query
      required: false
      description: Upper time bound (ISO-8601 date or instant, UTC).
      schema:
        type: string
        example: "2026-06-13"
    FilterSeverity:
      name: severity
      in: query
      required: false
      schema:
        $ref: '#/components/schemas/Severity'
    FilterType:
      name: type
      in: query
      required: false
      schema:
        $ref: '#/components/schemas/AlertType'
    FilterProtocol:
      name: protocol
      in: query
      required: false
      schema:
        $ref: '#/components/schemas/Protocol'
    FilterSourceIp:
      name: sourceIp
      in: query
      required: false
      schema:
        type: string
    FilterDestinationIp:
      name: destinationIp
      in: query
      required: false
      schema:
        type: string
    FilterDeviceId:
      name: deviceId
      in: query
      required: false
      schema:
        type: string
    FilterSourcePort:
      name: sourcePort
      in: query
      required: false
      schema:
        type: integer
        format: int32
    FilterDestinationPort:
      name: destinationPort
      in: query
      required: false
      schema:
        type: integer
        format: int32
    FilterMinPacketCount:
      name: minPacketCount
      in: query
      required: false
      schema:
        type: integer
        format: int64
    FilterMaxPacketCount:
      name: maxPacketCount
      in: query
      required: false
      schema:
        type: integer
        format: int64
    FilterMinBytes:
      name: minBytes
      in: query
      required: false
      schema:
        type: integer
        format: int64
    FilterMaxBytes:
      name: maxBytes
      in: query
      required: false
      schema:
        type: integer
        format: int64
    FilterMinWindowSeconds:
      name: minWindowSeconds
      in: query
      required: false
      schema:
        type: integer
        format: int32
    FilterAcknowledged:
      name: acknowledged
      in: query
      required: false
      schema:
        type: boolean
    FilterAlertId:
      name: alertId
      in: query
      required: false
      description: Exact alert identifier.
      schema:
        type: string
    FilterSearch:
      name: search
      in: query
      required: false
      description: Free-text match on source/destination IP, alert ID or description.
      schema:
        type: string
    FilterLimit:
      name: limit
      in: query
      required: false
      description: Max rows to return (clamped server-side).
      schema:
        type: integer
        format: int32
        default: 50000
    ReportFormat:
      name: format
      in: query
      required: false
      description: Output format for the download.
      schema:
        type: string
        enum: [csv, json]
        default: csv

  responses:
    BadRequest:
      description: Invalid request payload
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Unauthorized:
      description: Missing, invalid or expired credentials
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

  schemas:
    ApiResponse:
      $ref: '../schemas/Common.yaml#/ApiResponse'
    IndexResponse:
      $ref: '../schemas/Common.yaml#/IndexResponse'
    ErrorResponse:
      $ref: '../schemas/Common.yaml#/ErrorResponse'
    Link:
      $ref: '../schemas/Common.yaml#/Link'

    DeviceStatus:
      $ref: '../schemas/Device.yaml#/DeviceStatus'
    DeviceRegisterRequest:
      $ref: '../schemas/Device.yaml#/DeviceRegisterRequest'
    DeviceHeartbeatRequest:
      $ref: '../schemas/Device.yaml#/DeviceHeartbeatRequest'
    DeviceResponse:
      $ref: '../schemas/Device.yaml#/DeviceResponse'
    DeviceStatusResponse:
      $ref: '../schemas/Device.yaml#/DeviceStatusResponse'
    DeviceResponseEnvelope:
      $ref: '../schemas/Device.yaml#/DeviceResponseEnvelope'
    DeviceStatusEnvelope:
      $ref: '../schemas/Device.yaml#/DeviceStatusEnvelope'
    DevicePageEnvelope:
      $ref: '../schemas/Device.yaml#/DevicePageEnvelope'

    AlertType:
      $ref: '../schemas/Alert.yaml#/AlertType'
