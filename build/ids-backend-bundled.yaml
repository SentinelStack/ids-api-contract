openapi: 3.0.3
info:
  title: IDS Platform Backend API
  version: 1.11.0
  description: |-
    API for the OpenWrt IDS/IPS platform backend (Sentinel). Exposes processed security telemetry produced by the edge agent: devices and heartbeats, alerts, aggregated traffic statistics and packet/forensics metadata.
    Also documents the dashboard console view models (`/api/console/*`), the incident actions (assign/contain), and the report-export endpoints (`/api/reports/*`, served by the ClickHouse-backed download service behind the same gateway).
    Every successful response is wrapped in a standard envelope (`success`, `message`, `data`, `timestamp`). Resources and paged collections carry HATEOAS `links`. Errors return an `ErrorResponse`.
  license:
    name: Proprietary
servers:
  - url: https://api.puk3p.online
    description: Production backend server
security: []
tags:
  - name: Index
    description: Hypermedia entry point
  - name: Devices
    description: Device registration, heartbeat and status
  - name: Alerts
    description: Alert ingestion and retrieval
  - name: Traffic
    description: Aggregated traffic statistics
  - name: Forensics
    description: Packet-level forensic metadata
  - name: Console
    description: Pre-computed, page-specific view models for the dashboard
  - name: Reports
    description: Filtered alert exports (CSV/JSON), served by the ClickHouse download service
  - name: Rules
    description: OpenWrt edge detection rules and the agent-facing ruleset routers pull
paths:
  /api:
    get:
      tags:
        - Index
      summary: API hypermedia entry point
      operationId: getApiIndex
      responses:
        '200':
          description: Top-level links to the available collections and actions
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/IndexResponse'
  /api/devices/register:
    post:
      tags:
        - Devices
      summary: Register a device (or update an existing one)
      operationId: registerDevice
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DeviceRegisterRequest'
      responses:
        '201':
          description: Device registered
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeviceResponseEnvelope'
        '400':
          $ref: '#/components/responses/BadRequest'
  /api/devices/{deviceId}/heartbeat:
    post:
      tags:
        - Devices
      summary: Record a device heartbeat
      operationId: deviceHeartbeat
      parameters:
        - $ref: '#/components/parameters/DeviceIdPath'
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DeviceHeartbeatRequest'
      responses:
        '200':
          description: Heartbeat received
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeviceStatusEnvelope'
        '404':
          $ref: '#/components/responses/NotFound'
  /api/devices:
    get:
      tags:
        - Devices
      summary: List devices (paged)
      operationId: getDevices
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/SizeParam'
        - name: sortBy
          in: query
          required: false
          schema:
            type: string
            default: lastSeenAt
        - $ref: '#/components/parameters/DirectionParam'
      responses:
        '200':
          description: Page of devices
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DevicePageEnvelope'
  /api/devices/{deviceId}:
    get:
      tags:
        - Devices
      summary: Get a device by id
      operationId: getDeviceById
      parameters:
        - $ref: '#/components/parameters/DeviceIdPath'
      responses:
        '200':
          description: Device found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeviceResponseEnvelope'
        '404':
          $ref: '#/components/responses/NotFound'
  /api/devices/{deviceId}/status:
    get:
      tags:
        - Devices
      summary: Get a device status by id
      operationId: getDeviceStatus
      parameters:
        - $ref: '#/components/parameters/DeviceIdPath'
      responses:
        '200':
          description: Device status
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeviceStatusEnvelope'
        '404':
          $ref: '#/components/responses/NotFound'
  /api/devices/{deviceId}/quarantine:
    post:
      tags:
        - Devices
      summary: Quarantine (isolate) a device
      description: Marks the device QUARANTINED. While contained, incoming heartbeats are still recorded but no longer restore the device to ONLINE — only an explicit release lifts isolation. Idempotent.
      operationId: quarantineDevice
      parameters:
        - $ref: '#/components/parameters/DeviceIdPath'
      responses:
        '200':
          description: Device quarantined
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeviceStatusEnvelope'
        '404':
          $ref: '#/components/responses/NotFound'
  /api/devices/{deviceId}/release:
    post:
      tags:
        - Devices
      summary: Release a device from quarantine
      description: 'Lifts containment: the device drops to OFFLINE and recovers to ONLINE on its next heartbeat. Idempotent.'
      operationId: releaseDevice
      parameters:
        - $ref: '#/components/parameters/DeviceIdPath'
      responses:
        '200':
          description: Device released from quarantine
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeviceStatusEnvelope'
        '404':
          $ref: '#/components/responses/NotFound'
  /api/alerts:
    post:
      tags:
        - Alerts
      summary: Create an alert
      operationId: createAlert
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AlertCreateRequest'
      responses:
        '201':
          description: Alert created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AlertResponseEnvelope'
        '400':
          $ref: '#/components/responses/BadRequest'
    get:
      tags:
        - Alerts
      summary: List alerts with filters (paged)
      operationId: getAlerts
      parameters:
        - name: severity
          in: query
          required: false
          schema:
            $ref: '#/components/schemas/Severity'
        - name: protocol
          in: query
          required: false
          schema:
            $ref: '#/components/schemas/Protocol'
        - name: deviceId
          in: query
          required: false
          schema:
            type: string
        - name: sourceIp
          in: query
          required: false
          schema:
            type: string
        - name: from
          in: query
          required: false
          schema:
            type: string
            format: date-time
        - name: to
          in: query
          required: false
          schema:
            type: string
            format: date-time
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/SizeParam'
        - name: sortBy
          in: query
          required: false
          schema:
            type: string
            default: timestamp
        - $ref: '#/components/parameters/DirectionParam'
      responses:
        '200':
          description: Page of alerts
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AlertPageEnvelope'
  /api/alerts/latest:
    get:
      tags:
        - Alerts
      summary: Get the most recent alert
      operationId: getLatestAlert
      responses:
        '200':
          description: Latest alert
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AlertResponseEnvelope'
        '404':
          $ref: '#/components/responses/NotFound'
  /api/alerts/{alertId}:
    get:
      tags:
        - Alerts
      summary: Get an alert by id
      operationId: getAlertById
      parameters:
        - $ref: '#/components/parameters/AlertIdPath'
      responses:
        '200':
          description: Alert found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AlertResponseEnvelope'
        '404':
          $ref: '#/components/responses/NotFound'
  /api/alerts/by-device/{deviceId}:
    get:
      tags:
        - Alerts
      summary: List alerts for a device (paged)
      operationId: getAlertsByDevice
      parameters:
        - $ref: '#/components/parameters/DeviceIdPath'
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/SizeParam'
      responses:
        '200':
          description: Page of alerts for the device
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AlertPageEnvelope'
  /api/alerts/{alertId}/acknowledge:
    patch:
      tags:
        - Alerts
      summary: Acknowledge an alert
      operationId: acknowledgeAlert
      parameters:
        - $ref: '#/components/parameters/AlertIdPath'
      responses:
        '200':
          description: Alert acknowledged
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AlertResponseEnvelope'
        '404':
          $ref: '#/components/responses/NotFound'
  /api/traffic/stats:
    post:
      tags:
        - Traffic
      summary: Store a traffic-statistics window
      operationId: createTrafficStats
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TrafficStatsCreateRequest'
      responses:
        '201':
          description: Traffic stats stored
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TrafficStatsResponseEnvelope'
        '400':
          $ref: '#/components/responses/BadRequest'
  /api/traffic/stats/latest:
    get:
      tags:
        - Traffic
      summary: Get the most recent traffic-statistics window
      operationId: getLatestTrafficStats
      responses:
        '200':
          description: Latest traffic stats
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TrafficStatsResponseEnvelope'
        '404':
          $ref: '#/components/responses/NotFound'
  /api/traffic/stats/by-device/{deviceId}:
    get:
      tags:
        - Traffic
      summary: List traffic-statistics windows for a device (paged)
      operationId: getTrafficStatsByDevice
      parameters:
        - $ref: '#/components/parameters/DeviceIdPath'
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/SizeParam'
      responses:
        '200':
          description: Page of traffic stats for the device
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TrafficStatsPageEnvelope'
  /api/traffic/summary:
    get:
      tags:
        - Traffic
      summary: Get aggregated traffic totals and protocol percentages
      operationId: getTrafficSummary
      responses:
        '200':
          description: Traffic summary
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TrafficSummaryEnvelope'
  /api/forensics/packets:
    post:
      tags:
        - Forensics
      summary: Store a packet summary
      operationId: createPacketSummary
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PacketSummaryCreateRequest'
      responses:
        '201':
          description: Packet summary stored
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PacketSummaryResponseEnvelope'
        '400':
          $ref: '#/components/responses/BadRequest'
    get:
      tags:
        - Forensics
      summary: List packet summaries (paged)
      operationId: getPacketSummaries
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/SizeParam'
      responses:
        '200':
          description: Page of packet summaries
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PacketSummaryPageEnvelope'
  /api/forensics/by-alert/{alertId}:
    get:
      tags:
        - Forensics
      summary: List packet summaries for an alert (paged)
      operationId: getPacketSummariesByAlert
      parameters:
        - $ref: '#/components/parameters/AlertIdPath'
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/SizeParam'
      responses:
        '200':
          description: Page of packet summaries for the alert
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PacketSummaryPageEnvelope'
  /api/forensics/timeline:
    get:
      tags:
        - Forensics
      summary: Get the forensic packet timeline (paged)
      operationId: getForensicsTimeline
      parameters:
        - name: from
          in: query
          required: false
          schema:
            type: string
            format: date-time
        - name: to
          in: query
          required: false
          schema:
            type: string
            format: date-time
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/SizeParam'
      responses:
        '200':
          description: Page of timeline entries
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ForensicsTimelinePageEnvelope'
  /api/alerts/analysts:
    get:
      tags:
        - Alerts
      summary: List the analyst response roster
      operationId: getAnalysts
      responses:
        '200':
          description: Analyst roster
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AnalystListEnvelope'
  /api/alerts/{alertId}/assign:
    patch:
      tags:
        - Alerts
      summary: Assign an incident to an analyst
      description: Assigns the incident to a named roster analyst; when the body is omitted the backend auto-picks the least-loaded analyst.
      operationId: assignAlert
      parameters:
        - $ref: '#/components/parameters/AlertIdPath'
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AssignRequest'
      responses:
        '200':
          description: Updated alert
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AlertResponseEnvelope'
        '404':
          $ref: '#/components/responses/NotFound'
  /api/alerts/{alertId}/contain:
    post:
      tags:
        - Alerts
      summary: Contain the attacking source IP for an incident
      description: Records an active containment (block) for the alert's source IP. Idempotent — one active containment per source IP.
      operationId: containAlert
      parameters:
        - $ref: '#/components/parameters/AlertIdPath'
      responses:
        '200':
          description: Containment record (existing or newly created)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ContainmentResponseEnvelope'
        '404':
          $ref: '#/components/responses/NotFound'
  /api/console/dashboard:
    get:
      tags:
        - Console
      summary: Get the dashboard view model
      operationId: getDashboardView
      responses:
        '200':
          description: Dashboard view
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DashboardViewEnvelope'
  /api/console/traffic:
    get:
      tags:
        - Console
      summary: Get the traffic view model
      operationId: getTrafficView
      responses:
        '200':
          description: Traffic view
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TrafficViewEnvelope'
  /api/console/incidents:
    get:
      tags:
        - Console
      summary: Get the incidents view model
      operationId: getIncidentsView
      responses:
        '200':
          description: Incidents view
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IncidentsViewEnvelope'
  /api/console/incidents/{alertId}/forensics:
    get:
      tags:
        - Console
      summary: Get the forensic detail view for an incident
      operationId: getIncidentForensicsView
      parameters:
        - $ref: '#/components/parameters/AlertIdPath'
      responses:
        '200':
          description: Incident forensics view
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IncidentForensicsViewEnvelope'
  /api/console/rules:
    get:
      tags:
        - Console
      summary: Rules console — KPI strip + live trigger feed
      operationId: getRulesConsole
      responses:
        '200':
          description: Rules console view
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RulesConsoleEnvelope'
  /api/rules:
    get:
      tags:
        - Rules
      summary: List edge detection rules
      operationId: listRules
      parameters:
        - name: category
          in: query
          required: false
          schema:
            $ref: '#/components/schemas/RuleCategory'
        - name: interfaceScope
          in: query
          required: false
          schema:
            type: string
        - name: deviceId
          in: query
          required: false
          schema:
            type: string
      responses:
        '200':
          description: Rules
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RuleListEnvelope'
    post:
      tags:
        - Rules
      summary: Create a rule
      operationId: createRule
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RuleUpsertRequest'
      responses:
        '201':
          description: Rule created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RuleEnvelope'
  /api/rules/{ruleId}:
    parameters:
      - name: ruleId
        in: path
        required: true
        schema:
          type: string
    get:
      tags:
        - Rules
      summary: Get a rule
      operationId: getRule
      responses:
        '200':
          description: Rule
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RuleEnvelope'
        '404':
          $ref: '#/components/responses/NotFound'
    put:
      tags:
        - Rules
      summary: Update a rule
      operationId: updateRule
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RuleUpsertRequest'
      responses:
        '200':
          description: Rule updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RuleEnvelope'
    delete:
      tags:
        - Rules
      summary: Delete a rule
      operationId: deleteRule
      responses:
        '200':
          description: Rule deleted
  /api/rules/{ruleId}/enable:
    post:
      tags:
        - Rules
      summary: Enable a rule
      operationId: enableRule
      parameters:
        - name: ruleId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Rule enabled
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RuleEnvelope'
  /api/rules/{ruleId}/disable:
    post:
      tags:
        - Rules
      summary: Disable a rule
      operationId: disableRule
      parameters:
        - name: ruleId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Rule disabled
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RuleEnvelope'
  /api/rules/{ruleId}/deploy:
    post:
      tags:
        - Rules
      summary: Deploy a rule to its target router
      operationId: deployRule
      parameters:
        - name: ruleId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Rule deployed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RuleEnvelope'
  /api/devices/{deviceId}/ruleset:
    get:
      tags:
        - Rules
      summary: Agent-facing effective ruleset for a router
      description: The compact ruleset an OpenWrt edge agent pulls and applies to its on-router anomaly detector. Merges enabled rules targeting the device plus global rules; threshold keys (udpPacketThreshold, tcpPacketThreshold, byteThreshold) drive the detector directly.
      operationId: getAgentRuleset
      parameters:
        - $ref: '#/components/parameters/DeviceIdPath'
      responses:
        '200':
          description: Effective ruleset
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AgentRulesetEnvelope'
  /api/console/logs:
    get:
      tags:
        - Console
      summary: Unified log/event stream (Log Viewer)
      description: Merges real sources into one stream — the backend's own runtime logs, recent alerts (edge detections) and device lifecycle events — plus KPIs and pipeline integrity.
      operationId: getLogStream
      parameters:
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            format: int32
            default: 80
      responses:
        '200':
          description: Log stream
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LogStreamEnvelope'
  /api/console/topology/node/{deviceId}:
    get:
      tags:
        - Console
      summary: Live detail for a device-backed topology node
      description: Real status, IP, load (CPU/RAM from the agent heartbeat), activity (from the latest traffic window) and recent detections for a router.
      operationId: getTopologyNode
      parameters:
        - $ref: '#/components/parameters/DeviceIdPath'
      responses:
        '200':
          description: Node detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NodeDetailEnvelope'
        '404':
          $ref: '#/components/responses/NotFound'
  /api/console/topology/events:
    get:
      tags:
        - Console
      summary: Topology live feed — real domain events
      description: 'Recent events synthesised from live activity: alerts (anomaly / containment), device registrations and heartbeat status. Newest first.'
      operationId: getTopologyEvents
      parameters:
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            format: int32
            default: 40
      responses:
        '200':
          description: Topology events (newest first)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TopologyEventListEnvelope'
  /api/console/topology/logs:
    get:
      tags:
        - Console
      summary: Topology live feed — the backend's own runtime logs
      description: The backend service's most recent runtime log lines, captured by an in-memory ring-buffer appender. Newest first.
      operationId: getTopologyLogs
      parameters:
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            format: int32
            default: 40
      responses:
        '200':
          description: Runtime log lines (newest first)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RuntimeLogListEnvelope'
  /api/reports/meta:
    get:
      tags:
        - Reports
      summary: Get export filter options and the store's date range
      operationId: getReportMeta
      responses:
        '200':
          description: Filter metadata
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FilterMetaEnvelope'
  /api/reports/alerts/preview:
    get:
      tags:
        - Reports
      summary: Preview the rows a filtered alert export would contain
      operationId: previewAlertExport
      parameters:
        - $ref: '#/components/parameters/FilterFrom'
        - $ref: '#/components/parameters/FilterTo'
        - $ref: '#/components/parameters/FilterSeverity'
        - $ref: '#/components/parameters/FilterType'
        - $ref: '#/components/parameters/FilterProtocol'
        - $ref: '#/components/parameters/FilterSourceIp'
        - $ref: '#/components/parameters/FilterDestinationIp'
        - $ref: '#/components/parameters/FilterDeviceId'
        - $ref: '#/components/parameters/FilterSourcePort'
        - $ref: '#/components/parameters/FilterDestinationPort'
        - $ref: '#/components/parameters/FilterMinPacketCount'
        - $ref: '#/components/parameters/FilterMaxPacketCount'
        - $ref: '#/components/parameters/FilterMinBytes'
        - $ref: '#/components/parameters/FilterMaxBytes'
        - $ref: '#/components/parameters/FilterMinWindowSeconds'
        - $ref: '#/components/parameters/FilterAcknowledged'
        - $ref: '#/components/parameters/FilterAlertId'
        - $ref: '#/components/parameters/FilterSearch'
        - $ref: '#/components/parameters/FilterLimit'
      responses:
        '200':
          description: Preview rows
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PreviewResponseEnvelope'
        '400':
          $ref: '#/components/responses/BadRequest'
  /api/reports/alerts/download:
    get:
      tags:
        - Reports
      summary: Download filtered alerts as CSV or JSON
      operationId: downloadAlertExport
      parameters:
        - $ref: '#/components/parameters/FilterFrom'
        - $ref: '#/components/parameters/FilterTo'
        - $ref: '#/components/parameters/FilterSeverity'
        - $ref: '#/components/parameters/FilterType'
        - $ref: '#/components/parameters/FilterProtocol'
        - $ref: '#/components/parameters/FilterSourceIp'
        - $ref: '#/components/parameters/FilterDestinationIp'
        - $ref: '#/components/parameters/FilterDeviceId'
        - $ref: '#/components/parameters/FilterSourcePort'
        - $ref: '#/components/parameters/FilterDestinationPort'
        - $ref: '#/components/parameters/FilterMinPacketCount'
        - $ref: '#/components/parameters/FilterMaxPacketCount'
        - $ref: '#/components/parameters/FilterMinBytes'
        - $ref: '#/components/parameters/FilterMaxBytes'
        - $ref: '#/components/parameters/FilterMinWindowSeconds'
        - $ref: '#/components/parameters/FilterAcknowledged'
        - $ref: '#/components/parameters/FilterAlertId'
        - $ref: '#/components/parameters/FilterSearch'
        - $ref: '#/components/parameters/FilterLimit'
        - $ref: '#/components/parameters/ReportFormat'
      responses:
        '200':
          description: Streamed export file (attachment)
          content:
            text/csv:
              schema:
                type: string
                format: binary
            application/json:
              schema:
                type: string
                format: binary
        '400':
          $ref: '#/components/responses/BadRequest'
  /api/reports/volume:
    get:
      tags:
        - Reports
      summary: 24-hour threat-volume histogram (ClickHouse-backed)
      operationId: getThreatVolume
      responses:
        '200':
          description: Eight three-hour threat-volume buckets over the last 24h
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ThreatVolumeEnvelope'
  /api/reports/curated:
    get:
      tags:
        - Reports
      summary: List the curated reports
      operationId: listCuratedReports
      responses:
        '200':
          description: Curated report catalog
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CuratedReportListEnvelope'
  /api/reports/curated/{name}/download:
    get:
      tags:
        - Reports
      summary: Download a curated report as CSV or JSON
      operationId: downloadCuratedReport
      parameters:
        - name: name
          in: path
          required: true
          description: Curated report key (e.g. top_source_ips)
          schema:
            type: string
        - $ref: '#/components/parameters/ReportFormat'
      responses:
        '200':
          description: Streamed report file (attachment)
          content:
            text/csv:
              schema:
                type: string
                format: binary
            application/json:
              schema:
                type: string
                format: binary
        '400':
          $ref: '#/components/responses/BadRequest'
components:
  parameters:
    DeviceIdPath:
      name: deviceId
      in: path
      required: true
      description: Device identifier
      schema:
        type: string
    AlertIdPath:
      name: alertId
      in: path
      required: true
      description: Alert identifier
      schema:
        type: string
    PageParam:
      name: page
      in: query
      required: false
      schema:
        type: integer
        format: int32
        default: 0
    SizeParam:
      name: size
      in: query
      required: false
      schema:
        type: integer
        format: int32
        default: 20
    DirectionParam:
      name: direction
      in: query
      required: false
      schema:
        type: string
        enum:
          - asc
          - desc
        default: desc
    FilterFrom:
      name: from
      in: query
      required: false
      description: Lower time bound (ISO-8601 date or instant, UTC).
      schema:
        type: string
        example: '2026-06-12'
    FilterTo:
      name: to
      in: query
      required: false
      description: Upper time bound (ISO-8601 date or instant, UTC).
      schema:
        type: string
        example: '2026-06-13'
    FilterSeverity:
      name: severity
      in: query
      required: false
      schema:
        $ref: '#/components/schemas/Severity'
    FilterType:
      name: type
      in: query
      required: false
      schema:
        $ref: '#/components/schemas/AlertType'
    FilterProtocol:
      name: protocol
      in: query
      required: false
      schema:
        $ref: '#/components/schemas/Protocol'
    FilterSourceIp:
      name: sourceIp
      in: query
      required: false
      schema:
        type: string
    FilterDestinationIp:
      name: destinationIp
      in: query
      required: false
      schema:
        type: string
    FilterDeviceId:
      name: deviceId
      in: query
      required: false
      schema:
        type: string
    FilterSourcePort:
      name: sourcePort
      in: query
      required: false
      schema:
        type: integer
        format: int32
    FilterDestinationPort:
      name: destinationPort
      in: query
      required: false
      schema:
        type: integer
        format: int32
    FilterMinPacketCount:
      name: minPacketCount
      in: query
      required: false
      schema:
        type: integer
        format: int64
    FilterMaxPacketCount:
      name: maxPacketCount
      in: query
      required: false
      schema:
        type: integer
        format: int64
    FilterMinBytes:
      name: minBytes
      in: query
      required: false
      schema:
        type: integer
        format: int64
    FilterMaxBytes:
      name: maxBytes
      in: query
      required: false
      schema:
        type: integer
        format: int64
    FilterMinWindowSeconds:
      name: minWindowSeconds
      in: query
      required: false
      schema:
        type: integer
        format: int32
    FilterAcknowledged:
      name: acknowledged
      in: query
      required: false
      schema:
        type: boolean
    FilterAlertId:
      name: alertId
      in: query
      required: false
      description: Exact alert identifier.
      schema:
        type: string
    FilterSearch:
      name: search
      in: query
      required: false
      description: Free-text match on source/destination IP, alert ID or description.
      schema:
        type: string
    FilterLimit:
      name: limit
      in: query
      required: false
      description: Max rows to return (clamped server-side).
      schema:
        type: integer
        format: int32
        default: 50000
    ReportFormat:
      name: format
      in: query
      required: false
      description: Output format for the download.
      schema:
        type: string
        enum:
          - csv
          - json
        default: csv
  responses:
    BadRequest:
      description: Invalid request payload
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
  schemas:
    ApiResponse:
      type: object
      description: Standard response envelope wrapping every successful response.
      required:
        - success
        - message
        - timestamp
      properties:
        success:
          type: boolean
          example: true
        message:
          type: string
          example: Operation completed
        timestamp:
          type: string
          format: date-time
          example: '2026-06-01T10:00:00Z'
    IndexResponse:
      type: object
      description: Hypermedia entry point returned by GET /api.
      properties:
        links:
          $ref: '#/components/schemas/LinkList'
    ErrorResponse:
      type: object
      required:
        - timestamp
        - status
        - error
        - message
        - path
      properties:
        timestamp:
          type: string
          format: date-time
        status:
          type: integer
          format: int32
          example: 404
        error:
          type: string
          example: Not Found
        message:
          type: string
          example: 'Device not found: router-01'
        path:
          type: string
          example: /api/devices/router-01
        validationErrors:
          type: object
          nullable: true
          additionalProperties:
            type: string
          example:
            deviceId: deviceId is required
    Link:
      type: object
      required:
        - rel
        - href
      properties:
        rel:
          type: string
          example: self
        href:
          type: string
          example: https://api.puk3p.online/api/devices/7c9e6679-7425-40de-944b-e07fc1f90ae7
    DeviceStatus:
      type: string
      enum:
        - ONLINE
        - OFFLINE
        - QUARANTINED
        - UNKNOWN
      description: 'Lifecycle status. QUARANTINED is operator-applied containment: a quarantined device stays isolated regardless of heartbeats until it is explicitly released.'
      example: ONLINE
    DeviceRegisterRequest:
      type: object
      required:
        - name
        - ipAddress
      properties:
        deviceId:
          type: string
          nullable: true
          description: Optional pre-assigned id; the backend generates one when omitted.
          example: 7c9e6679-7425-40de-944b-e07fc1f90ae7
        name:
          type: string
          example: Router Lab A
        ipAddress:
          type: string
          example: 192.168.1.1
        firmwareVersion:
          type: string
          nullable: true
          example: OpenWrt 23.05.3
        model:
          type: string
          nullable: true
          example: Linksys WRT3200ACM
    DeviceHeartbeatRequest:
      type: object
      description: Optional body for a heartbeat; an absent seenAt defaults to now.
      properties:
        seenAt:
          type: string
          format: date-time
          nullable: true
          example: '2026-06-01T10:00:00Z'
        cpuPercent:
          type: integer
          nullable: true
          minimum: 0
          maximum: 100
          description: Router CPU utilisation reported by the agent.
          example: 41
        memPercent:
          type: integer
          nullable: true
          minimum: 0
          maximum: 100
          description: Router memory utilisation reported by the agent.
          example: 55
    DeviceResponse:
      type: object
      required:
        - deviceId
        - name
        - ipAddress
        - status
        - lastSeenAt
        - createdAt
        - updatedAt
      properties:
        deviceId:
          type: string
          example: 7c9e6679-7425-40de-944b-e07fc1f90ae7
        name:
          type: string
          example: Router Lab A
        ipAddress:
          type: string
          example: 192.168.1.1
        status:
          $ref: '#/components/schemas/DeviceStatus'
        lastSeenAt:
          type: string
          format: date-time
        firmwareVersion:
          type: string
          nullable: true
          example: OpenWrt 23.05.3
        model:
          type: string
          nullable: true
          example: Linksys WRT3200ACM
        quarantinedAt:
          type: string
          format: date-time
          nullable: true
          description: When the device was put under quarantine; null when not contained.
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        links:
          $ref: '#/components/schemas/LinkList'
    DeviceStatusResponse:
      type: object
      required:
        - deviceId
        - status
        - lastSeenAt
      properties:
        deviceId:
          type: string
          example: 7c9e6679-7425-40de-944b-e07fc1f90ae7
        status:
          $ref: '#/components/schemas/DeviceStatus'
        lastSeenAt:
          type: string
          format: date-time
        quarantinedAt:
          type: string
          format: date-time
          nullable: true
          description: When the device was put under quarantine; null when not contained.
        links:
          $ref: '#/components/schemas/LinkList'
    DeviceResponseEnvelope:
      allOf:
        - $ref: '#/components/schemas/ApiResponse'
        - type: object
          properties:
            data:
              $ref: '#/components/schemas/DeviceResponse'
    DeviceStatusEnvelope:
      allOf:
        - $ref: '#/components/schemas/ApiResponse'
        - type: object
          properties:
            data:
              $ref: '#/components/schemas/DeviceStatusResponse'
    DevicePageEnvelope:
