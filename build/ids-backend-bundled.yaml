      type: object
      description: Small preview of the rows a filtered alert export would contain.
      required:
        - returned
        - limit
        - hasMore
        - columns
        - rows
      properties:
        returned:
          type: integer
          format: int32
          example: 16
        limit:
          type: integer
          format: int32
          example: 100
        hasMore:
