AlertType:
  type: string
  enum:
    - UDP_FLOOD_SUSPECTED
    - TCP_SPIKE_SUSPECTED
    - HIGH_TRAFFIC_VOLUME
    - PORT_SCAN_SUSPECTED
    - UNKNOWN
  example: UDP_FLOOD_SUSPECTED

Severity:
  type: string
  enum:
    - LOW
    - MEDIUM
    - HIGH
    - CRITICAL
  example: HIGH

Protocol:
  type: string
  enum:
    - TCP
    - UDP
    - ICMP
    - UNKNOWN
  example: UDP

AlertCreateRequest:
  type: object
  required:
    - deviceId
    - timestamp
    - type
    - severity
    - protocol
    - sourceIp
    - destinationIp
    - sourcePort
    - destinationPort
    - packetCount
    - bytesCount
    - windowSeconds
  properties:
    deviceId:
      type: string
      example: "7c9e6679-7425-40de-944b-e07fc1f90ae7"
    timestamp:
      type: string
      format: date-time
      example: "2026-06-01T10:00:05Z"
    type:
      $ref: '#/AlertType'
    severity:
      $ref: '#/Severity'
    protocol:
      $ref: '#/Protocol'
    sourceIp:
      type: string
      example: "10.10.10.2"
    destinationIp:
      type: string
      example: "192.168.1.10"
    sourcePort:
      type: integer
      format: int32
      minimum: 0
      example: 5353
    destinationPort:
      type: integer
      format: int32
      minimum: 0
      example: 443
    packetCount:
      type: integer
      format: int64
      minimum: 0
      example: 230
    bytesCount:
      type: integer
      format: int64
      minimum: 0
      example: 120000
    windowSeconds:
      type: integer
      format: int32
      minimum: 0
      example: 5
    description:
      type: string
      nullable: true
      example: "Traffic burst above baseline"

AlertResponse:
  type: object
  required:
    - alertId
    - deviceId
    - timestamp
    - type
    - severity
    - protocol
    - sourceIp
    - destinationIp
    - sourcePort
    - destinationPort
    - packetCount
    - bytesCount
    - windowSeconds
    - acknowledged
    - createdAt
  properties:
    alertId:
      type: string
      example: "21f088f9-4695-47ae-b9f3-d75df5606b11"
    deviceId:
      type: string
      example: "7c9e6679-7425-40de-944b-e07fc1f90ae7"
    timestamp:
      type: string
      format: date-time
    type:
      $ref: '#/AlertType'
    severity:
      $ref: '#/Severity'
    protocol:
      $ref: '#/Protocol'
    sourceIp:
      type: string
      example: "10.10.10.2"
    destinationIp:
      type: string
      example: "192.168.1.10"
    sourcePort:
      type: integer
      format: int32
      example: 5353
    destinationPort:
      type: integer
      format: int32
      example: 443
    packetCount:
      type: integer
      format: int64
      example: 230
    bytesCount:
      type: integer
      format: int64
      example: 120000
    windowSeconds:
      type: integer
      format: int32
      example: 5
    description:
      type: string
      nullable: true
      example: "Traffic burst above baseline"
    acknowledged:
      type: boolean
      example: false
    createdAt:
      type: string
      format: date-time
    links:
      $ref: './Common.yaml#/LinkList'

AlertResponseEnvelope:
  allOf:
    - $ref: './Common.yaml#/ApiResponse'
    - type: object
      properties:
        data:
          $ref: '#/AlertResponse'

AlertPage:
  allOf:
    - $ref: './Common.yaml#/PageMeta'
    - type: object
      properties:
        content:
          type: array
          items:
            $ref: '#/AlertResponse'

AlertPageEnvelope:
  allOf:
    - $ref: './Common.yaml#/ApiResponse'
    - type: object
      properties:
        data:
          $ref: '#/AlertPage'

AssignRequest:
  type: object
  description: Optional body for the assign action. Names a roster analyst; when omitted the backend auto-picks the least-loaded analyst.
  properties:
    analyst:
      type: string
      nullable: true
      example: Ana Popescu

ContainmentResponse:
  type: object
  description: An active containment (block) recorded for an attacking source IP.
  required:
    - containmentId
    - alertId
    - sourceIp
    - deviceId
    - reason
    - severity
    - active
    - alreadyActive
  properties:
    containmentId:
      type: string
    alertId:
      type: string
    sourceIp:
      type: string
    deviceId:
      type: string
    reason:
      type: string
      example: "Containment for UDP_FLOOD_SUSPECTED from 203.0.113.10"
    severity:
      $ref: '#/Severity'
    active:
      type: boolean
    createdAt:
      type: string
      format: date-time
      nullable: true
    alreadyActive:
      type: boolean
      description: True when a containment for this source IP already existed (idempotent).

ContainmentResponseEnvelope:
  allOf:
    - $ref: './Common.yaml#/ApiResponse'
    - type: object
      properties:
        data:
          $ref: '#/ContainmentResponse'

AnalystListEnvelope:
  allOf:
    - $ref: './Common.yaml#/ApiResponse'
    - type: object
      properties:
        data:
          type: array
          items:
            type: string
          example: [Ana Popescu, Mihai Ionescu, Elena Radu, Andrei Stoica]
