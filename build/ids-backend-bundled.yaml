openapi: 3.0.3
info:
  title: IDS Platform Backend API
  version: 1.1.1
  description: |-
    API for the OpenWrt IDS/IPS platform backend (Sentinel). Exposes processed security telemetry produced by the edge agent: devices and heartbeats, alerts, aggregated traffic statistics and packet/forensics metadata.
    Every successful response is wrapped in a standard envelope (`success`, `message`, `data`, `timestamp`). Resources and paged collections carry HATEOAS `links`. Errors return an `ErrorResponse`.
  license:
    name: Proprietary
servers:
  - url: https://api.puk3p.online
    description: Production backend server
security: []
tags:
  - name: Index
    description: Hypermedia entry point
  - name: Devices
    description: Device registration, heartbeat and status
  - name: Alerts
    description: Alert ingestion and retrieval
  - name: Traffic
    description: Aggregated traffic statistics
  - name: Forensics
    description: Packet-level forensic metadata
paths:
  /api:
    get:
      tags:
        - Index
      summary: API hypermedia entry point
      operationId: getApiIndex
      responses:
        '200':
          description: Top-level links to the available collections and actions
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/IndexResponse'
  /api/devices/register:
    post:
      tags:
        - Devices
      summary: Register a device (or update an existing one)
      operationId: registerDevice
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DeviceRegisterRequest'
      responses:
        '200':
          description: Device registered
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeviceResponseEnvelope'
        '400':
          $ref: '#/components/responses/BadRequest'
  /api/devices/{deviceId}/heartbeat:
    post:
      tags:
        - Devices
      summary: Record a device heartbeat
      operationId: deviceHeartbeat
      parameters:
        - $ref: '#/components/parameters/DeviceIdPath'
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DeviceHeartbeatRequest'
      responses:
        '200':
          description: Heartbeat received
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeviceStatusEnvelope'
        '404':
          $ref: '#/components/responses/NotFound'
  /api/devices:
    get:
      tags:
        - Devices
      summary: List devices (paged)
      operationId: getDevices
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/SizeParam'
        - name: sortBy
          in: query
          required: false
          schema:
            type: string
            default: lastSeenAt
        - $ref: '#/components/parameters/DirectionParam'
      responses:
        '200':
          description: Page of devices
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DevicePageEnvelope'
  /api/devices/{deviceId}:
    get:
      tags:
        - Devices
      summary: Get a device by id
      operationId: getDeviceById
      parameters:
        - $ref: '#/components/parameters/DeviceIdPath'
      responses:
        '200':
          description: Device found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeviceResponseEnvelope'
        '404':
          $ref: '#/components/responses/NotFound'
  /api/devices/{deviceId}/status:
    get:
      tags:
        - Devices
      summary: Get a device status by id
      operationId: getDeviceStatus
      parameters:
        - $ref: '#/components/parameters/DeviceIdPath'
      responses:
        '200':
          description: Device status
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeviceStatusEnvelope'
        '404':
          $ref: '#/components/responses/NotFound'
  /api/alerts:
    post:
      tags:
        - Alerts
      summary: Create an alert
      operationId: createAlert
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AlertCreateRequest'
      responses:
        '200':
          description: Alert created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AlertResponseEnvelope'
        '400':
          $ref: '#/components/responses/BadRequest'
    get:
      tags:
        - Alerts
      summary: List alerts with filters (paged)
      operationId: getAlerts
      parameters:
        - name: severity
          in: query
          required: false
          schema:
            $ref: '#/components/schemas/Severity'
        - name: protocol
          in: query
          required: false
          schema:
            $ref: '#/components/schemas/Protocol'
        - name: deviceId
          in: query
          required: false
          schema:
            type: string
        - name: sourceIp
          in: query
          required: false
          schema:
            type: string
        - name: from
          in: query
          required: false
          schema:
            type: string
            format: date-time
        - name: to
          in: query
          required: false
          schema:
            type: string
            format: date-time
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/SizeParam'
        - name: sortBy
          in: query
          required: false
          schema:
            type: string
            default: timestamp
        - $ref: '#/components/parameters/DirectionParam'
      responses:
        '200':
          description: Page of alerts
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AlertPageEnvelope'
  /api/alerts/latest:
    get:
      tags:
        - Alerts
      summary: Get the most recent alert
      operationId: getLatestAlert
      responses:
        '200':
          description: Latest alert
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AlertResponseEnvelope'
        '404':
          $ref: '#/components/responses/NotFound'
  /api/alerts/{alertId}:
    get:
      tags:
        - Alerts
      summary: Get an alert by id
      operationId: getAlertById
      parameters:
        - $ref: '#/components/parameters/AlertIdPath'
      responses:
        '200':
          description: Alert found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AlertResponseEnvelope'
        '404':
          $ref: '#/components/responses/NotFound'
  /api/alerts/by-device/{deviceId}:
    get:
      tags:
        - Alerts
      summary: List alerts for a device (paged)
      operationId: getAlertsByDevice
      parameters:
        - $ref: '#/components/parameters/DeviceIdPath'
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/SizeParam'
      responses:
        '200':
          description: Page of alerts for the device
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AlertPageEnvelope'
  /api/alerts/{alertId}/acknowledge:
    patch:
      tags:
        - Alerts
      summary: Acknowledge an alert
      operationId: acknowledgeAlert
      parameters:
        - $ref: '#/components/parameters/AlertIdPath'
      responses:
        '200':
          description: Alert acknowledged
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AlertResponseEnvelope'
        '404':
          $ref: '#/components/responses/NotFound'
  /api/traffic/stats:
    post:
      tags:
        - Traffic
      summary: Store a traffic-statistics window
      operationId: createTrafficStats
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TrafficStatsCreateRequest'
      responses:
        '200':
          description: Traffic stats stored
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TrafficStatsResponseEnvelope'
        '400':
          $ref: '#/components/responses/BadRequest'
  /api/traffic/stats/latest:
    get:
      tags:
        - Traffic
      summary: Get the most recent traffic-statistics window
      operationId: getLatestTrafficStats
      responses:
        '200':
          description: Latest traffic stats
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TrafficStatsResponseEnvelope'
        '404':
          $ref: '#/components/responses/NotFound'
  /api/traffic/stats/by-device/{deviceId}:
    get:
      tags:
        - Traffic
      summary: List traffic-statistics windows for a device (paged)
      operationId: getTrafficStatsByDevice
      parameters:
        - $ref: '#/components/parameters/DeviceIdPath'
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/SizeParam'
      responses:
        '200':
          description: Page of traffic stats for the device
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TrafficStatsPageEnvelope'
  /api/traffic/summary:
    get:
      tags:
        - Traffic
      summary: Get aggregated traffic totals and protocol percentages
      operationId: getTrafficSummary
      responses:
        '200':
          description: Traffic summary
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TrafficSummaryEnvelope'
  /api/forensics/packets:
    post:
      tags:
        - Forensics
      summary: Store a packet summary
      operationId: createPacketSummary
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PacketSummaryCreateRequest'
      responses:
        '200':
          description: Packet summary stored
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PacketSummaryResponseEnvelope'
        '400':
          $ref: '#/components/responses/BadRequest'
    get:
      tags:
        - Forensics
      summary: List packet summaries (paged)
      operationId: getPacketSummaries
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/SizeParam'
      responses:
        '200':
          description: Page of packet summaries
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PacketSummaryPageEnvelope'
  /api/forensics/by-alert/{alertId}:
    get:
      tags:
        - Forensics
      summary: List packet summaries for an alert (paged)
      operationId: getPacketSummariesByAlert
      parameters:
        - $ref: '#/components/parameters/AlertIdPath'
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/SizeParam'
      responses:
        '200':
          description: Page of packet summaries for the alert
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PacketSummaryPageEnvelope'
  /api/forensics/timeline:
    get:
      tags:
        - Forensics
      summary: Get the forensic packet timeline (paged)
      operationId: getForensicsTimeline
      parameters:
        - name: from
          in: query
          required: false
          schema:
            type: string
            format: date-time
        - name: to
          in: query
          required: false
          schema:
            type: string
            format: date-time
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/SizeParam'
      responses:
        '200':
          description: Page of timeline entries
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ForensicsTimelinePageEnvelope'
components:
  parameters:
    DeviceIdPath:
      name: deviceId
      in: path
      required: true
      description: Device identifier
      schema:
        type: string
    AlertIdPath:
      name: alertId
      in: path
      required: true
      description: Alert identifier
      schema:
        type: string
    PageParam:
      name: page
      in: query
      required: false
      schema:
        type: integer
        format: int32
        default: 0
    SizeParam:
      name: size
      in: query
      required: false
      schema:
        type: integer
        format: int32
        default: 20
    DirectionParam:
      name: direction
      in: query
      required: false
      schema:
        type: string
        enum:
          - asc
          - desc
        default: desc
  responses:
    BadRequest:
      description: Invalid request payload
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
  schemas:
    ApiResponse:
      type: object
      description: Standard response envelope wrapping every successful response.
      required:
        - success
        - message
        - timestamp
      properties:
        success:
          type: boolean
          example: true
        message:
          type: string
          example: Operation completed
        timestamp:
          type: string
          format: date-time
          example: '2026-06-01T10:00:00Z'
    IndexResponse:
      type: object
      description: Hypermedia entry point returned by GET /api.
      properties:
        links:
          $ref: '#/components/schemas/LinkList'
    ErrorResponse:
      type: object
      required:
        - timestamp
        - status
        - error
        - message
        - path
      properties:
        timestamp:
          type: string
          format: date-time
        status:
          type: integer
          format: int32
          example: 404
        error:
          type: string
          example: Not Found
        message:
          type: string
          example: 'Device not found: router-01'
        path:
          type: string
          example: /api/devices/router-01
        validationErrors:
          type: object
          nullable: true
          additionalProperties:
            type: string
          example:
            deviceId: deviceId is required
    Link:
      type: object
      required:
        - rel
        - href
      properties:
        rel:
          type: string
          example: self
        href:
          type: string
          example: https://api.puk3p.online/api/devices/7c9e6679-7425-40de-944b-e07fc1f90ae7
    DeviceStatus:
      type: string
      enum:
        - ONLINE
        - OFFLINE
        - UNKNOWN
      example: ONLINE
    DeviceRegisterRequest:
      type: object
      required:
        - name
        - ipAddress
      properties:
        deviceId:
          type: string
          nullable: true
          description: Optional pre-assigned id; the backend generates one when omitted.
          example: 7c9e6679-7425-40de-944b-e07fc1f90ae7
        name:
          type: string
          example: Router Lab A
        ipAddress:
          type: string
          example: 192.168.1.1
        firmwareVersion:
          type: string
          nullable: true
          example: OpenWrt 23.05.3
        model:
          type: string
          nullable: true
          example: Linksys WRT3200ACM
    DeviceHeartbeatRequest:
      type: object
      description: Optional body for a heartbeat; an absent seenAt defaults to now.
      properties:
        seenAt:
          type: string
          format: date-time
          nullable: true
          example: '2026-06-01T10:00:00Z'
    DeviceResponse:
      type: object
      required:
        - deviceId
        - name
        - ipAddress
        - status
        - lastSeenAt
        - createdAt
        - updatedAt
      properties:
        deviceId:
          type: string
          example: 7c9e6679-7425-40de-944b-e07fc1f90ae7
        name:
          type: string
          example: Router Lab A
        ipAddress:
          type: string
          example: 192.168.1.1
        status:
          $ref: '#/components/schemas/DeviceStatus'
        lastSeenAt:
          type: string
          format: date-time
        firmwareVersion:
          type: string
          nullable: true
          example: OpenWrt 23.05.3
        model:
          type: string
          nullable: true
          example: Linksys WRT3200ACM
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        links:
          $ref: '#/components/schemas/LinkList'
    DeviceStatusResponse:
      type: object
      required:
        - deviceId
        - status
        - lastSeenAt
      properties:
        deviceId:
          type: string
          example: 7c9e6679-7425-40de-944b-e07fc1f90ae7
        status:
          $ref: '#/components/schemas/DeviceStatus'
        lastSeenAt:
          type: string
          format: date-time
        links:
          $ref: '#/components/schemas/LinkList'
    DeviceResponseEnvelope:
      allOf:
        - $ref: '#/components/schemas/ApiResponse'
        - type: object
          properties:
            data:
              $ref: '#/components/schemas/DeviceResponse'
    DeviceStatusEnvelope:
      allOf:
        - $ref: '#/components/schemas/ApiResponse'
        - type: object
          properties:
            data:
              $ref: '#/components/schemas/DeviceStatusResponse'
    DevicePageEnvelope:
      allOf:
        - $ref: '#/components/schemas/ApiResponse'
        - type: object
          properties:
            data:
              $ref: '#/components/schemas/DevicePage'
    AlertType:
      type: string
      enum:
        - UDP_FLOOD_SUSPECTED
        - TCP_SPIKE_SUSPECTED
        - HIGH_TRAFFIC_VOLUME
        - PORT_SCAN_SUSPECTED
        - UNKNOWN
      example: UDP_FLOOD_SUSPECTED
    Severity:
      type: string
      enum:
        - LOW
        - MEDIUM
        - HIGH
        - CRITICAL
      example: HIGH
    Protocol:
      type: string
      enum:
        - TCP
        - UDP
        - ICMP
        - UNKNOWN
      example: UDP
    AlertCreateRequest:
      type: object
      required:
        - deviceId
        - timestamp
        - type
        - severity
        - protocol
        - sourceIp
        - destinationIp
        - sourcePort
        - destinationPort
        - packetCount
        - bytesCount
        - windowSeconds
      properties:
        deviceId:
          type: string
          example: 7c9e6679-7425-40de-944b-e07fc1f90ae7
        timestamp:
          type: string
          format: date-time
          example: '2026-06-01T10:00:05Z'
        type:
          $ref: '#/components/schemas/AlertType'
        severity:
          $ref: '#/components/schemas/Severity'
        protocol:
          $ref: '#/components/schemas/Protocol'
        sourceIp:
          type: string
          example: 10.10.10.2
        destinationIp:
          type: string
          example: 192.168.1.10
        sourcePort:
          type: integer
          format: int32
          minimum: 0
          example: 5353
        destinationPort:
          type: integer
          format: int32
          minimum: 0
          example: 443
        packetCount:
          type: integer
          format: int64
          minimum: 0
          example: 230
        bytesCount:
          type: integer
          format: int64
          minimum: 0
          example: 120000
        windowSeconds:
          type: integer
          format: int32
          minimum: 0
          example: 5
        description:
          type: string
          nullable: true
          example: Traffic burst above baseline
    AlertResponse:
      type: object
      required:
        - alertId
        - deviceId
        - timestamp
        - type
        - severity
        - protocol
        - sourceIp
        - destinationIp
        - sourcePort
        - destinationPort
        - packetCount
        - bytesCount
        - windowSeconds
        - acknowledged
        - createdAt
      properties:
        alertId:
          type: string
          example: 21f088f9-4695-47ae-b9f3-d75df5606b11
        deviceId:
          type: string
          example: 7c9e6679-7425-40de-944b-e07fc1f90ae7
        timestamp:
          type: string
          format: date-time
        type:
          $ref: '#/components/schemas/AlertType'
        severity:
          $ref: '#/components/schemas/Severity'
        protocol:
          $ref: '#/components/schemas/Protocol'
        sourceIp:
          type: string
          example: 10.10.10.2
        destinationIp:
          type: string
          example: 192.168.1.10
        sourcePort:
          type: integer
          format: int32
          example: 5353
        destinationPort:
          type: integer
          format: int32
          example: 443
        packetCount:
          type: integer
          format: int64
          example: 230
        bytesCount:
          type: integer
          format: int64
          example: 120000
        windowSeconds:
          type: integer
          format: int32
          example: 5
        description:
          type: string
          nullable: true
          example: Traffic burst above baseline
        acknowledged:
          type: boolean
          example: false
        createdAt:
          type: string
          format: date-time
        links:
          $ref: '#/components/schemas/LinkList'
    AlertResponseEnvelope:
      allOf:
        - $ref: '#/components/schemas/ApiResponse'
        - type: object
          properties:
            data:
              $ref: '#/components/schemas/AlertResponse'
    AlertPageEnvelope:
      allOf:
        - $ref: '#/components/schemas/ApiResponse'
        - type: object
          properties:
            data:
              $ref: '#/components/schemas/AlertPage'
    TrafficStatsCreateRequest:
      type: object
      required:
        - deviceId
        - timestamp
        - totalPackets
        - tcpPackets
        - udpPackets
        - totalBytes
        - tcpBytes
        - udpBytes
        - windowSeconds
      properties:
        deviceId:
          type: string
          example: 7c9e6679-7425-40de-944b-e07fc1f90ae7
        timestamp:
          type: string
          format: date-time
          example: '2026-06-01T10:00:00Z'
        totalPackets:
          type: integer
          format: int64
          minimum: 0
          example: 34000
        tcpPackets:
          type: integer
          format: int64
          minimum: 0
          example: 21000
        udpPackets:
          type: integer
          format: int64
          minimum: 0
          example: 13000
        totalBytes:
          type: integer
          format: int64
          minimum: 0
          example: 28000000
        tcpBytes:
          type: integer
          format: int64
          minimum: 0
          example: 21000000
        udpBytes:
          type: integer
          format: int64
          minimum: 0
          example: 7000000
        windowSeconds:
          type: integer
          format: int32
          minimum: 0
          example: 60
    TrafficStatsResponse:
      type: object
      required:
        - deviceId
        - timestamp
        - totalPackets
        - tcpPackets
        - udpPackets
        - totalBytes
        - tcpBytes
        - udpBytes
        - windowSeconds
        - createdAt
      properties:
        deviceId:
          type: string
          example: 7c9e6679-7425-40de-944b-e07fc1f90ae7
        timestamp:
          type: string
          format: date-time
        totalPackets:
          type: integer
          format: int64
          example: 34000
        tcpPackets:
          type: integer
          format: int64
          example: 21000
        udpPackets:
          type: integer
          format: int64
          example: 13000
        totalBytes:
          type: integer
          format: int64
          example: 28000000
        tcpBytes:
          type: integer
          format: int64
          example: 21000000
        udpBytes:
          type: integer
          format: int64
          example: 7000000
        windowSeconds:
          type: integer
          format: int32
          example: 60
        createdAt:
          type: string
          format: date-time
        links:
          $ref: '#/components/schemas/LinkList'
    TrafficSummaryResponse:
      type: object
      required:
        - totalPackets
        - tcpPackets
        - udpPackets
        - totalBytes
        - tcpBytes
        - udpBytes
        - tcpPercentage
        - udpPercentage
      properties:
        totalPackets:
          type: integer
          format: int64
          example: 34000
        tcpPackets:
          type: integer
          format: int64
          example: 21000
        udpPackets:
          type: integer
          format: int64
          example: 13000
        totalBytes:
          type: integer
          format: int64
          example: 28000000
        tcpBytes:
          type: integer
          format: int64
          example: 21000000
        udpBytes:
          type: integer
          format: int64
          example: 7000000
        tcpPercentage:
          type: number
          format: double
          example: 61.76
        udpPercentage:
          type: number
          format: double
          example: 38.24
        links:
          $ref: '#/components/schemas/LinkList'
    TrafficStatsResponseEnvelope:
      allOf:
        - $ref: '#/components/schemas/ApiResponse'
        - type: object
          properties:
            data:
              $ref: '#/components/schemas/TrafficStatsResponse'
    TrafficSummaryEnvelope:
      allOf:
        - $ref: '#/components/schemas/ApiResponse'
        - type: object
          properties:
            data:
              $ref: '#/components/schemas/TrafficSummaryResponse'
    TrafficStatsPageEnvelope:
      allOf:
        - $ref: '#/components/schemas/ApiResponse'
        - type: object
          properties:
            data:
              $ref: '#/components/schemas/TrafficStatsPage'
    PacketSummaryCreateRequest:
      type: object
      required:
        - deviceId
        - timestamp
        - protocol
        - sourceIp
        - destinationIp
        - sourcePort
        - destinationPort
        - packetSize
      properties:
        deviceId:
          type: string
