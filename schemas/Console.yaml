# Pre-computed, page-specific view models served to the dashboard. These are
# presentation DTOs (already aggregated/formatted server-side); fields are
# strings where the UI renders them verbatim.

# ── Shared ──────────────────────────────────────────────────────────────────
ProtocolShare:
  type: object
  required: [name, pct]
  properties:
    name:
      type: string
      example: TCP
    pct:
      type: number
      format: double
      example: 61.6

TopPort:
  type: object
  required: [label, packets, danger]
  properties:
    label:
      type: string
      example: "22 (SSH)"
    packets:
      type: string
      example: "1.2K PKTS"
    danger:
      type: boolean
      example: true

# ── Incidents view ──────────────────────────────────────────────────────────
IncidentKpis:
  type: object
  required: [open, openDelta, critical, investigating, resolved, uniqueSources]
  properties:
    open:
      type: integer
      format: int32
    openDelta:
      type: string
      example: "+12 / 1h"
    critical:
      type: integer
      format: int32
    investigating:
      type: integer
      format: int32
    resolved:
      type: integer
      format: int32
    uniqueSources:
      type: integer
      format: int32

TimelineBar:
  type: object
  required: [height, level]
  properties:
    height:
      type: integer
      format: int32
      example: 80
    level:
      type: string
      enum: [crit, warn, info]

IncidentRow:
  type: object
  required:
    - id
    - incId
    - timestamp
    - severity
    - title
    - source
    - target
    - category
    - status
    - statusIcon
    - assignee
    - acknowledged
    - contained
    - confidence
    - anomalyScore
    - packetRate
    - volume
    - targetPort
    - protocol
  properties:
    id:
      type: string
      description: Underlying alertId.
    incId:
      type: string
      example: INC-2026-0613-89F0
    timestamp:
      type: string
      format: date-time
    severity:
      type: string
    title:
      type: string
      example: DDoS Vector Identified
    source:
      type: string
    target:
      type: string
    category:
      type: string
      example: DDoS
    status:
      type: string
      enum: [New, Investigating, Resolved]
    statusIcon:
      type: string
    assignee:
      type: string
      example: Ana Popescu
    acknowledged:
      type: boolean
    contained:
      type: boolean
    confidence:
      type: integer
      format: int32
      example: 96
    anomalyScore:
      type: string
      example: "0.94"
    packetRate:
      type: string
      example: "46 pkt/s"
    volume:
      type: string
      example: "21.3 KB"
    targetPort:
      type: integer
      format: int32
    protocol:
      type: string

SeverityDistribution:
  type: object
  required: [critical, high, medium, low, total]
  properties:
    critical:
      type: integer
      format: int32
    high:
      type: integer
      format: int32
    medium:
      type: integer
      format: int32
    low:
      type: integer
      format: int32
    total:
      type: integer
      format: int32

AffectedAsset:
  type: object
  required: [name, ip, icon, level]
  properties:
    name:
      type: string
    ip:
      type: string
    icon:
      type: string
    level:
      type: string

IncidentsView:
  type: object
  required: [kpis, timeline, queue, severity, assets]
  properties:
    kpis:
      $ref: '#/IncidentKpis'
    timeline:
      type: array
      items:
        $ref: '#/TimelineBar'
    queue:
      type: array
      items:
        $ref: '#/IncidentRow'
    severity:
      $ref: '#/SeverityDistribution'
    assets:
      type: array
      items:
        $ref: '#/AffectedAsset'

IncidentsViewEnvelope:
  allOf:
    - $ref: './Common.yaml#/ApiResponse'
    - type: object
      properties:
        data:
          $ref: '#/IncidentsView'

# ── Incident forensics view ─────────────────────────────────────────────────
ForensicStat:
  type: object
  required: [label, value]
  properties:
    label:
      type: string
    value:
      type: string

ForensicPacket:
  type: object
  required: [timestamp, protocol, source, destination, port, size, flags, suspicious]
  properties:
    timestamp:
      type: string
      format: date-time
    protocol:
      type: string
    source:
      type: string
    destination:
      type: string
    port:
      type: integer
      format: int32
    size:
      type: string
    flags:
      type: string
    suspicious:
      type: boolean

IncidentForensicsView:
  type: object
  required: [incId, title, source, target, severity, category, contained, stats, protocols, topPorts, packets, empty]
  properties:
    incId:
      type: string
    title:
      type: string
    source:
      type: string
    target:
      type: string
    severity:
      type: string
    category:
      type: string
    contained:
      type: boolean
    stats:
      type: array
      items:
        $ref: '#/ForensicStat'
    protocols:
      type: array
      items:
        $ref: '#/ProtocolShare'
    topPorts:
      type: array
      items:
        $ref: '#/TopPort'
    packets:
      type: array
      items:
        $ref: '#/ForensicPacket'
    empty:
      type: boolean

IncidentForensicsViewEnvelope:
  allOf:
    - $ref: './Common.yaml#/ApiResponse'
    - type: object
      properties:
        data:
          $ref: '#/IncidentForensicsView'

# ── Traffic view ────────────────────────────────────────────────────────────
FlowPoint:
  type: object
  required: [tcp, udp]
  properties:
    tcp:
      type: integer
      format: int32
    udp:
      type: integer
      format: int32

TopSource:
  type: object
  required: [ip, scope]
  properties:
    ip:
      type: string
    scope:
      type: string
      enum: [LOCAL, EXTERNAL]

PacketRow:
  type: object
  required: [timestamp, protocol, source, destination, port, size, suspicious]
  properties:
    timestamp:
      type: string
      format: date-time
    protocol:
      type: string
    source:
      type: string
    destination:
      type: string
    port:
      type: integer
      format: int32
    size:
      type: string
    suspicious:
      type: boolean

DistBar:
  type: object
  required: [height, hot]
  properties:
    height:
      type: integer
      format: int32
    hot:
      type: boolean

TrafficView:
  type: object
  required:
    - totalPackets
    - tcpPct
    - udpPct
    - suspiciousPct
    - protocols
    - flow
    - topPorts
    - topSources
    - packets
    - distribution
  properties:
    totalPackets:
      type: string
      example: "570.8K"
    tcpPct:
      type: integer
      format: int32
    udpPct:
      type: integer
      format: int32
    suspiciousPct:
      type: string
      example: "15.0"
    protocols:
      type: array
      items:
        $ref: '#/ProtocolShare'
    flow:
      type: array
      items:
        $ref: '#/FlowPoint'
    topPorts:
      type: array
      items:
        $ref: '#/TopPort'
    topSources:
      type: array
      items:
        $ref: '#/TopSource'
    packets:
      type: array
      items:
        $ref: '#/PacketRow'
    distribution:
      type: array
      items:
        $ref: '#/DistBar'

TrafficViewEnvelope:
  allOf:
    - $ref: './Common.yaml#/ApiResponse'
    - type: object
      properties:
        data:
          $ref: '#/TrafficView'

# ── Dashboard view ──────────────────────────────────────────────────────────
DashboardKpis:
  type: object
  required: [totalAlerts, uniqueSources, systemHealth]
  properties:
    totalAlerts:
      type: string
    uniqueSources:
      type: string
    systemHealth:
      type: string
      example: "100%"

LiveAlert:
  type: object
  required: [severity, level, timestamp, title, source, destination]
  properties:
    severity:
      type: string
    level:
      type: string
      enum: [critical, warning, info]
    timestamp:
      type: string
      format: date-time
    title:
      type: string
    source:
      type: string
    destination:
      type: string

VolumeBar:
  type: object
  required: [height, hot]
  properties:
    height:
      type: integer
      format: int32
    hot:
      type: boolean

Origin:
  type: object
  required: [name, pct, rank]
  properties:
    name:
      type: string
      example: United States
    pct:
      type: number
      format: double
    rank:
      type: integer
      format: int32

ThreatArc:
  type: object
  required: [lat, lng, sourceIp, country, level]
  properties:
    lat:
      type: number
      format: double
    lng:
      type: number
      format: double
    sourceIp:
      type: string
    country:
      type: string
    level:
      type: string
      enum: [critical, medium, low]

DashboardView:
  type: object
  required: [kpis, liveAlerts, volumeDelta, volume, origins, arcs, deviceLat, deviceLng]
  properties:
    kpis:
      $ref: '#/DashboardKpis'
    liveAlerts:
      type: array
      items:
        $ref: '#/LiveAlert'
    volumeDelta:
      type: string
    volume:
      type: array
      items:
        $ref: '#/VolumeBar'
    origins:
      type: array
      items:
        $ref: '#/Origin'
    arcs:
      type: array
      items:
        $ref: '#/ThreatArc'
    deviceLat:
      type: number
      format: double
    deviceLng:
      type: number
      format: double

DashboardViewEnvelope:
  allOf:
    - $ref: './Common.yaml#/ApiResponse'
    - type: object
      properties:
        data:
          $ref: '#/DashboardView'
