PacketSummaryCreateRequest:
  type: object
  required:
    - deviceId
    - timestamp
    - protocol
    - sourceIp
    - destinationIp
    - sourcePort
    - destinationPort
    - packetSize
  properties:
    deviceId:
      type: string
      example: "7c9e6679-7425-40de-944b-e07fc1f90ae7"
    alertId:
      type: string
      nullable: true
      example: "21f088f9-4695-47ae-b9f3-d75df5606b11"
    timestamp:
      type: string
      format: date-time
      example: "2026-06-01T10:00:05Z"
    protocol:
      $ref: './Alert.yaml#/Protocol'
    sourceIp:
      type: string
      example: "10.10.10.2"
    destinationIp:
      type: string
      example: "192.168.1.10"
    sourcePort:
      type: integer
      format: int32
      minimum: 0
      example: 5353
    destinationPort:
      type: integer
      format: int32
      minimum: 0
      example: 443
    packetSize:
      type: integer
      format: int64
      minimum: 0
      example: 1500
    tcpFlags:
      type: string
      nullable: true
      example: "SYN"

PacketSummaryResponse:
  type: object
  required:
    - deviceId
    - timestamp
    - protocol
    - sourceIp
    - destinationIp
    - sourcePort
    - destinationPort
    - packetSize
    - createdAt
  properties:
    deviceId:
      type: string
      example: "7c9e6679-7425-40de-944b-e07fc1f90ae7"
    alertId:
      type: string
      nullable: true
      example: "21f088f9-4695-47ae-b9f3-d75df5606b11"
    timestamp:
      type: string
      format: date-time
    protocol:
      $ref: './Alert.yaml#/Protocol'
    sourceIp:
      type: string
      example: "10.10.10.2"
    destinationIp:
      type: string
      example: "192.168.1.10"
    sourcePort:
      type: integer
      format: int32
      example: 5353
    destinationPort:
      type: integer
      format: int32
      example: 443
    packetSize:
      type: integer
      format: int64
      example: 1500
    tcpFlags:
      type: string
      nullable: true
      example: "SYN"
    createdAt:
      type: string
      format: date-time
    links:
      $ref: './Common.yaml#/LinkList'

ForensicsTimelineEntry:
  type: object
  required:
    - timestamp
    - deviceId
    - protocol
    - sourceIp
    - destinationIp
    - packetSize
  properties:
    timestamp:
      type: string
      format: date-time
    deviceId:
      type: string
      example: "7c9e6679-7425-40de-944b-e07fc1f90ae7"
    alertId:
      type: string
      nullable: true
      example: "21f088f9-4695-47ae-b9f3-d75df5606b11"
    protocol:
      $ref: './Alert.yaml#/Protocol'
    sourceIp:
      type: string
      example: "10.10.10.2"
    destinationIp:
      type: string
      example: "192.168.1.10"
    packetSize:
      type: integer
      format: int64
      example: 1500
    links:
      $ref: './Common.yaml#/LinkList'

PacketSummaryResponseEnvelope:
  allOf:
    - $ref: './Common.yaml#/ApiResponse'
    - type: object
      properties:
        data:
          $ref: '#/PacketSummaryResponse'

PacketSummaryPage:
  allOf:
    - $ref: './Common.yaml#/PageMeta'
    - type: object
      properties:
        content:
          type: array
          items:
            $ref: '#/PacketSummaryResponse'

PacketSummaryPageEnvelope:
  allOf:
    - $ref: './Common.yaml#/ApiResponse'
    - type: object
      properties:
        data:
          $ref: '#/PacketSummaryPage'

ForensicsTimelinePage:
  allOf:
    - $ref: './Common.yaml#/PageMeta'
    - type: object
      properties:
        content:
          type: array
          items:
            $ref: '#/ForensicsTimelineEntry'

ForensicsTimelinePageEnvelope:
  allOf:
    - $ref: './Common.yaml#/ApiResponse'
    - type: object
      properties:
        data:
          $ref: '#/ForensicsTimelinePage'

# ── Agent bulk forensics ingest ──────────────────────────────────────────────
# The edge agent batches a sample (<=32) of the most recent captured packets and
# POSTs them once per 5-second window, only when at least one alert fired that
# window. The sample includes the offending/flood source. Each item is persisted
# as a packet summary (alertId null); the incident forensics view later
# correlates them by the alert's sourceIp.

ForensicsPacketItem:
  type: object
  required:
    - timestamp
    - protocol
    - sourceIp
    - destinationIp
    - sourcePort
    - destinationPort
    - packetSize
  properties:
    timestamp:
      type: string
      format: date-time
      description: Packet capture time, ISO-8601 UTC.
      example: "2026-06-25T21:42:13Z"
    protocol:
      type: string
      enum:
        - TCP
        - UDP
      example: UDP
    sourceIp:
      type: string
      example: "1.2.3.4"
    destinationIp:
      type: string
      example: "5.6.7.8"
    sourcePort:
      type: integer
      format: int32
      minimum: 0
      example: 1234
    destinationPort:
      type: integer
      format: int32
      minimum: 0
      example: 53
    packetSize:
      type: integer
      format: int64
      minimum: 0
      example: 120

ForensicsBatchRequest:
  type: object
  required:
    - deviceId
    - packets
  properties:
    deviceId:
      type: string
      example: "edge-router-01"
    packets:
      type: array
      description: A sample (<=32) of the most recent captured packets.
      items:
        $ref: '#/ForensicsPacketItem'

ForensicsIngestAck:
  type: object
  required:
    - saved
  properties:
    saved:
      type: integer
      format: int32
      description: Number of packet summaries persisted from the batch.
      example: 32

ForensicsIngestAckEnvelope:
  allOf:
    - $ref: './Common.yaml#/ApiResponse'
    - type: object
      properties:
        data:
          $ref: '#/ForensicsIngestAck'
