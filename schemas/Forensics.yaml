PacketSummaryCreateRequest:
  type: object
  required:
    - deviceId
    - timestamp
    - protocol
    - sourceIp
    - destinationIp
    - sourcePort
    - destinationPort
    - packetSize
  properties:
    deviceId:
      type: string
      example: "7c9e6679-7425-40de-944b-e07fc1f90ae7"
    alertId:
      type: string
      nullable: true
      example: "21f088f9-4695-47ae-b9f3-d75df5606b11"
    timestamp:
      type: string
      format: date-time
      example: "2026-06-01T10:00:05Z"
    protocol:
      $ref: './Alert.yaml#/Protocol'
    sourceIp:
      type: string
      example: "10.10.10.2"
    destinationIp:
      type: string
      example: "192.168.1.10"
    sourcePort:
      type: integer
      format: int32
      minimum: 0
      example: 5353
    destinationPort:
      type: integer
      format: int32
      minimum: 0
      example: 443
    packetSize:
      type: integer
      format: int64
      minimum: 0
      example: 1500
    tcpFlags:
      type: string
      nullable: true
      example: "SYN"

PacketSummaryResponse:
  type: object
  required:
    - deviceId
    - timestamp
    - protocol
    - sourceIp
    - destinationIp
    - sourcePort
    - destinationPort
    - packetSize
    - createdAt
  properties:
    deviceId:
      type: string
      example: "7c9e6679-7425-40de-944b-e07fc1f90ae7"
    alertId:
      type: string
      nullable: true
      example: "21f088f9-4695-47ae-b9f3-d75df5606b11"
    timestamp:
      type: string
      format: date-time
    protocol:
      $ref: './Alert.yaml#/Protocol'
    sourceIp:
      type: string
      example: "10.10.10.2"
    destinationIp:
      type: string
      example: "192.168.1.10"
    sourcePort:
      type: integer
      format: int32
      example: 5353
    destinationPort:
      type: integer
      format: int32
      example: 443
    packetSize:
      type: integer
      format: int64
      example: 1500
    tcpFlags:
      type: string
      nullable: true
      example: "SYN"
    createdAt:
      type: string
      format: date-time
    links:
      $ref: './Common.yaml#/LinkList'

ForensicsTimelineEntry:
  type: object
  required:
    - timestamp
    - deviceId
    - protocol
    - sourceIp
    - destinationIp
    - packetSize
  properties:
    timestamp:
      type: string
      format: date-time
    deviceId:
      type: string
      example: "7c9e6679-7425-40de-944b-e07fc1f90ae7"
    alertId:
      type: string
      nullable: true
      example: "21f088f9-4695-47ae-b9f3-d75df5606b11"
    protocol:
      $ref: './Alert.yaml#/Protocol'
    sourceIp:
      type: string
      example: "10.10.10.2"
    destinationIp:
      type: string
      example: "192.168.1.10"
    packetSize:
      type: integer
      format: int64
      example: 1500
    links:
      $ref: './Common.yaml#/LinkList'

PacketSummaryResponseEnvelope:
  allOf:
    - $ref: './Common.yaml#/ApiResponse'
    - type: object
      properties:
        data:
          $ref: '#/PacketSummaryResponse'

PacketSummaryPage:
  allOf:
    - $ref: './Common.yaml#/PageMeta'
    - type: object
      properties:
        content:
          type: array
          items:
            $ref: '#/PacketSummaryResponse'

PacketSummaryPageEnvelope:
  allOf:
    - $ref: './Common.yaml#/ApiResponse'
    - type: object
      properties:
        data:
          $ref: '#/PacketSummaryPage'

ForensicsTimelinePage:
  allOf:
    - $ref: './Common.yaml#/PageMeta'
    - type: object
      properties:
        content:
          type: array
          items:
            $ref: '#/ForensicsTimelineEntry'

ForensicsTimelinePageEnvelope:
  allOf:
    - $ref: './Common.yaml#/ApiResponse'
    - type: object
      properties:
        data:
          $ref: '#/ForensicsTimelinePage'
