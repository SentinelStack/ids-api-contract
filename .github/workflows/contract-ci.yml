name: IDS API Contract CI

on:
  pull_request:
    branches: [ main, master ]
  push:
    branches: [ main, master ]

jobs:
  validate-contract:
    name: Validate Contract
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install validation tools
        run: |
          npm install -g @redocly/cli @apidevtools/swagger-cli

      - name: Check required files exist
        run: |
          test -f openapi/ids-backend.yaml
          test -f schemas/Alert.yaml
          test -f schemas/Device.yaml
          test -f schemas/Report.yaml
          test -f examples/alert-example.json
          test -f examples/device-status-example.json

      - name: Validate OpenAPI with swagger-cli
        run: |
          swagger-cli validate openapi/ids-backend.yaml

      - name: Lint OpenAPI with Redocly
        run: |
          redocly lint openapi/ids-backend.yaml

      - name: Bundle OpenAPI
        run: |
          mkdir -p build
          redocly bundle openapi/ids-backend.yaml -o build/ids-backend-bundled.yaml

      - name: Upload bundled contract artifact
        uses: actions/upload-artifact@v4
        with:
          name: bundled-openapi
          path: build/ids-backend-bundled.yaml

  lint-contract:
    name: Lint Contract
    runs-on: ubuntu-latest
    needs: validate-contract

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Redocly CLI
        run: |
          npm install -g @redocly/cli

      - name: Lint OpenAPI
        run: |
          redocly lint openapi/ids-backend.yaml

  package-and-publish:
    name: Package and Publish
    runs-on: ubuntu-latest
    needs: [validate-contract, lint-contract]
    if: github.event_name == 'push'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Setup Maven settings.xml
        run: |
          mkdir -p ~/.m2
          cat > ~/.m2/settings.xml <<EOF
          <settings>
            <servers>
              <server>
                <id>nexus-releases</id>
                <username>${NEXUS_USERNAME}</username>
                <password>${NEXUS_PASSWORD}</password>
              </server>
              <server>
                <id>nexus-snapshots</id>
                <username>${NEXUS_USERNAME}</username>
                <password>${NEXUS_PASSWORD}</password>
              </server>
            </servers>
          </settings>
          EOF
        env:
          NEXUS_USERNAME: ${{ secrets.NEXUS_USERNAME }}
          NEXUS_PASSWORD: ${{ secrets.NEXUS_PASSWORD }}

      - name: Build package
        run: mvn -B clean package

      - name: Publish to Nexus
        run: mvn -B deploy