DeviceStatus:
  type: string
  enum:
    - ONLINE
    - OFFLINE
    - QUARANTINED
    - UNKNOWN
  description: >-
    Lifecycle status. QUARANTINED is operator-applied containment: a quarantined
    device stays isolated regardless of heartbeats until it is explicitly released.
  example: ONLINE

DeviceRegisterRequest:
  type: object
  required:
    - name
    - ipAddress
  properties:
    deviceId:
      type: string
      nullable: true
      description: Optional pre-assigned id; the backend generates one when omitted.
      example: "7c9e6679-7425-40de-944b-e07fc1f90ae7"
    name:
      type: string
      example: "Router Lab A"
    ipAddress:
      type: string
      example: "192.168.1.1"
    firmwareVersion:
      type: string
      nullable: true
      example: "OpenWrt 23.05.3"
    model:
      type: string
      nullable: true
      example: "Linksys WRT3200ACM"

DeviceHeartbeatRequest:
  type: object
  description: Optional body for a heartbeat; an absent seenAt defaults to now.
  properties:
    seenAt:
      type: string
      format: date-time
      nullable: true
      example: "2026-06-01T10:00:00Z"

DeviceResponse:
  type: object
  required:
    - deviceId
    - name
    - ipAddress
    - status
    - lastSeenAt
    - createdAt
    - updatedAt
  properties:
    deviceId:
      type: string
      example: "7c9e6679-7425-40de-944b-e07fc1f90ae7"
    name:
      type: string
      example: "Router Lab A"
    ipAddress:
      type: string
      example: "192.168.1.1"
    status:
      $ref: '#/DeviceStatus'
    lastSeenAt:
      type: string
      format: date-time
    firmwareVersion:
      type: string
      nullable: true
      example: "OpenWrt 23.05.3"
    model:
      type: string
      nullable: true
      example: "Linksys WRT3200ACM"
    quarantinedAt:
      type: string
      format: date-time
      nullable: true
      description: When the device was put under quarantine; null when not contained.
    createdAt:
      type: string
      format: date-time
    updatedAt:
      type: string
      format: date-time
    links:
      $ref: './Common.yaml#/LinkList'

DeviceStatusResponse:
  type: object
  required:
    - deviceId
    - status
    - lastSeenAt
  properties:
    deviceId:
      type: string
      example: "7c9e6679-7425-40de-944b-e07fc1f90ae7"
    status:
      $ref: '#/DeviceStatus'
    lastSeenAt:
      type: string
      format: date-time
    quarantinedAt:
      type: string
      format: date-time
      nullable: true
      description: When the device was put under quarantine; null when not contained.
    links:
      $ref: './Common.yaml#/LinkList'

DeviceResponseEnvelope:
  allOf:
    - $ref: './Common.yaml#/ApiResponse'
    - type: object
      properties:
        data:
          $ref: '#/DeviceResponse'

DeviceStatusEnvelope:
  allOf:
    - $ref: './Common.yaml#/ApiResponse'
    - type: object
      properties:
        data:
          $ref: '#/DeviceStatusResponse'

DevicePage:
  allOf:
    - $ref: './Common.yaml#/PageMeta'
    - type: object
      properties:
        content:
          type: array
          items:
            $ref: '#/DeviceResponse'

DevicePageEnvelope:
  allOf:
    - $ref: './Common.yaml#/ApiResponse'
    - type: object
      properties:
        data:
          $ref: '#/DevicePage'
