Report:
  type: object
  required:
    - id
    - type
    - format
    - status
    - requestedBy
    - createdAt
  properties:
    id:
      type: string
      example: "report-001"
    type:
      type: string
      enum: [ALERT_SUMMARY, DEVICE_STATUS, INCIDENT_EXPORT]
      example: "ALERT_SUMMARY"
    format:
      type: string
      enum: [CSV, PDF, JSON]
      example: "CSV"
    status:
      type: string
      enum: [PENDING, PROCESSING, READY, FAILED]
      example: "READY"
    requestedBy:
      type: string
      example: "admin"
    from:
      type: string
      format: date-time
      nullable: true
      example: "2026-04-01T00:00:00Z"
    to:
      type: string
      format: date-time
      nullable: true
      example: "2026-04-25T23:59:59Z"
    createdAt:
      type: string
      format: date-time
      example: "2026-04-25T19:10:00Z"
    downloadUrl:
      type: string
      nullable: true
      example: "/api/reports/report-001/download"

ReportCreateRequest:
  type: object
  required:
    - type
    - format
    - requestedBy
  properties:
    type:
      type: string
      enum: [ALERT_SUMMARY, DEVICE_STATUS, INCIDENT_EXPORT]
      example: "ALERT_SUMMARY"
    format:
      type: string
      enum: [CSV, PDF, JSON]
      example: "CSV"
    requestedBy:
      type: string
      example: "admin"
    from:
      type: string
      format: date-time
      nullable: true
      example: "2026-04-01T00:00:00Z"
    to:
      type: string
      format: date-time
      nullable: true
      example: "2026-04-25T23:59:59Z"